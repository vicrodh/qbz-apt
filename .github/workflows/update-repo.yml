name: Update APT Repository

on:
  repository_dispatch:
    types: [new-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to fetch (e.g. v1.1.19). Leave empty for latest."
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Checkout gh-pages into public/
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: public
        continue-on-error: true

      - name: Initialize public/ if gh-pages doesn't exist
        run: mkdir -p public

      - name: Determine release tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
          DISPATCH_TAG: ${{ github.event.client_payload.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${INPUT_TAG:-${DISPATCH_TAG:-}}"
          if [[ -z "$TAG" ]]; then
            echo "No tag provided, fetching latest release..."
            TAG=$(gh release view --repo vicrodh/qbz --json tagName -q '.tagName')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag: $TAG"

      - name: Download .deb files from release
        env:
          GH_TOKEN: ${{ secrets.APT_REPO_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p staging
          gh release download "$TAG" \
            --repo vicrodh/qbz \
            --pattern '*.deb' \
            --dir staging

          echo "Downloaded .deb files:"
          ls -la staging/

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep -m1 'sec' | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> "$GITHUB_ENV"

      - name: Build APT repository
        run: |
          # Ensure directory structure
          mkdir -p public/pool/main
          mkdir -p public/dists/stable/main/binary-amd64
          mkdir -p public/dists/stable/main/binary-arm64

          # Copy new .deb files to pool (overwrite same version)
          cp -v staging/*.deb public/pool/main/

          # Generate Packages indices
          cd public

          dpkg-scanpackages --arch amd64 pool/main > dists/stable/main/binary-amd64/Packages
          gzip -k -f dists/stable/main/binary-amd64/Packages

          dpkg-scanpackages --arch arm64 pool/main > dists/stable/main/binary-arm64/Packages
          gzip -k -f dists/stable/main/binary-arm64/Packages

          # Generate Release file
          cat > dists/stable/Release <<EOF
          Origin: QBZ
          Label: QBZ
          Suite: stable
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: QBZ - Native Qobuz client for Linux
          EOF
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' dists/stable/Release

          # Add hashes
          apt-ftparchive release dists/stable >> dists/stable/Release

          # Sign Release file
          gpg --batch --yes --default-key "$GPG_KEY_ID" \
            -abs -o dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --default-key "$GPG_KEY_ID" \
            --clearsign -o dists/stable/InRelease dists/stable/Release

          cd ..

      - name: Export public GPG key
        run: |
          gpg --armor --export "$GPG_KEY_ID" > public/qbz-archive-keyring.gpg
          gpg --export "$GPG_KEY_ID" > public/qbz-archive-keyring-binary.gpg

      - name: Deploy to gh-pages
        run: |
          cd public
          git init
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Update APT repo for ${{ steps.tag.outputs.tag }}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/vicrodh/qbz-apt.git" gh-pages
